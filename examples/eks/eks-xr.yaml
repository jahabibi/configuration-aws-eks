apiVersion: aws.platform.upbound.io/v1alpha1
kind: Compute
metadata:
  name: configuration-aws-eks
  namespace: default
spec:
  parameters:
    id: configuration-aws-eks
    region: us-west-2
    engine: eks
    nodes:
      count: 1
      size: small
    # Normally injected by the composing Cluster from Network.status.zones[];
    # shown explicitly here because this example renders Compute standalone.
    # (Standalone, setting networkRef.id instead would resolve these via
    # extra-resources from the Network's published status.)
    subnetIds:
      public:
        - subnet-0a1b2c3d4e5f00001
        - subnet-0a1b2c3d4e5f00002
        - subnet-0a1b2c3d4e5f00003
